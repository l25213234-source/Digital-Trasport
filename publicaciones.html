<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicaciones | Digital Transport</title>
    <style>
        :root {
            --brand-rosa: #ec4899; --dark: #0f172a;
            --c-inicio: #3b82f6; --c-nosotros: #10b981; --c-app: #f59e0b;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #f8fafc; overflow-x: hidden; }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--dark); }
        .menu-links { display: flex; gap: 5px; flex-wrap: wrap; }
        .menu-links a { color: white; text-decoration: none; padding: 8px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }

        .content { max-width: 800px; margin: 20px auto; padding: 20px; }
        .media-card { background: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        img { max-width: 100%; height: auto; border-radius: 10px; }
        audio { width: 100%; margin-top: 10px; }

        @media (max-width: 768px) {
            .menu-links { justify-content: center; width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">DIGITAL TRANSPORT</a>
    <div class="menu-links">
        <a href="index.html" style="background:var(--c-inicio)">Inicio</a>
        <a href="nosotros.html" style="background:var(--c-nosotros)">Nosotros</a>
        <a href="app.html" style="background:var(--c-app)">APP</a>
        <a href="publicaciones.html" style="background:var(--brand-rosa)">Publicaciones</a>
        <a href="contacto.html" style="background:#ef4444">Contacto</a>
    </div>
</nav>

<div class="content">

        <h2>Spot de Radio</h2>
        <audio controls><source src="spot radio.m4a" type="audio/mp4"></audio>
    </div>
    <div class="media-card">
        <h2>Campaña Visual</h2>
        <img src="IMG-20260310-WA0012.jpg" alt="Volante">
    </div>
</div>

</html>
