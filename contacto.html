<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto | Digital Transport</title>
<style>
    :root {
        --brand: #12b0a6;
        --dark: #111827;
        --c-inicio: #3b82f6;
        --c-contacto: #ef4444;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #f3f4f6; overflow-x: hidden; width: 100%; }

    nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: var(--dark); }
    .menu-links { display: flex; gap: 5px; flex-wrap: wrap; }
    .menu-links a { color: white; text-decoration: none; padding: 8px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }

    .form-container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
    button { width: 100%; padding: 15px; background: var(--c-contacto); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

    @media (max-width: 768px) {
        .menu-links { justify-content: center; width: 100%; margin-top: 10px; }
        .form-container { margin: 20px; }
    }
</style>
</head>
<body>

<nav>
    <a href="index.html" style="color:white; text-decoration:none;">DIGITAL TRANSPORT</a>
    <div class="menu-links">
        <a href="index.html" style="background:var(--c-inicio)">Inicio</a>
        <a href="nosotros.html" style="background:#10b981">Nosotros</a>
        <a href="app.html" style="background:#f59e0b">APP</a>
        <a href="soporte.html" style="background:#8b5cf6">Soporte</a>
        <a href="contacto.html" style="background:var(--c-contacto)">Contacto</a>
    </div>
</nav>

<div class="form-container">
    <h2>Escríbenos</h2>
    <p>Dudas, quejas o sugerencias sobre el transporte en Tijuana.</p>
    <input type="text" placeholder="Tu Nombre">
    <input type="email" placeholder="Tu Correo">
    <textarea placeholder="¿En qué podemos ayudarte?" rows="5"></textarea>
    <button>ENVIAR MENSAJE</button>
</div>

</body>
</html>
