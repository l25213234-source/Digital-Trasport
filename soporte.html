<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte | Digital Transport</title>
    <style>
        :root {
            --primary: #00c3ff;
            --dark-bg: #0b1c2d;
            --c-inicio: #3b82f6; 
            --c-nosotros: #7a0366; 
            --c-app: #f59e0b;
            --c-soporte: #8b5cf6; 
            --c-publicaciones: #ec4899;
            --c-contacto: #ef4444; 
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #0b1c2d; color: white; overflow-x: hidden; width: 100%; }

        /* NAV UNIFICADO */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; background: #000; position: sticky; top: 0; z-index: 1000; }
        .menu-links { display: flex; gap: 5px; flex-wrap: wrap; }
        .menu-links a { color: white; text-decoration: none; padding: 8px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: bold; }

        .container { max-width: 600px; margin: 30px auto; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; }
        #chat { height: 300px; overflow-y: auto; background: white; color: black; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 5px; }
        .user { background: #e0f2fe; text-align: right; }
        .bot { background: #f0fdf4; }
        
        input { width: 80%; padding: 10px; border-radius: 5px; border: none; }
        button { width: 18%; padding: 10px; background: var(--primary); border: none; border-radius: 5px; cursor: pointer; }

        @media (max-width: 768px) {
            .menu-links { justify-content: center; width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" style="color:white; text-decoration:none; font-weight:bold;">DIGITAL TRANSPORT</a>
    <div class="menu-links">
        <a href="index.html" style="background:var(--c-inicio)">Inicio</a>
        <a href="nosotros.html" style="background:var(--c-nosotros)">Nosotros</a>
        <a href="app.html" style="background:var(--c-app)">APP</a>
        <a href="soporte.html" style="background:var(--c-soporte)">Soporte</a>
        <a href="publicaciones.html" style="background:var(--c-publicaciones)">Publicaciones</a>
        <a href="acercade.html">Acerca de</a>
        <a href="contacto.html" style="background:var(--c-contacto)">Contacto</a>
    </div>
</nav>

<div class="container">
    <h2>Centro de Ayuda Digital</h2>
    <div id="chat">
        <div class="message bot">Hola, ¿en qué puedo ayudarte con tu ruta hoy?</div>
    </div>
    <input type="text" id="input" placeholder="Pregunta algo...">
    <button onclick="sendMessage()">Enviar</button>
</div>

<script>
    function sendMessage(){
        let input = document.getElementById("input");
        let chat = document.getElementById("chat");
        if(input.value.trim() === "") return;
        
        chat.innerHTML += `<div class="message user">${input.value}</div>`;
        let txt = input.value.toLowerCase();
        input.value = "";
        
        setTimeout(() => {
            let res = "Estamos analizando tu reporte. En breve un agente te contactará.";
            if(txt.includes("ruta")) res = "Puedes ver todas las rutas activas en la sección APP.";
            chat.innerHTML += `<div class="message bot">${res}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 1000);
    }
</script>
</body>
</html>
